name: Refresh GitHub Trending

on:
  schedule:
    - cron: '0 13 * * *'   # 9 AM ET daily (UTC-4 summer)
  workflow_dispatch:         # also runnable manually from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch trending repos
        run: python3 tools/fetch_trending.py

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/trending.json data/trending.js
          git diff --cached --quiet || git commit -m "chore: refresh trending repos $(date -u +%Y-%m-%d)"
          git push
